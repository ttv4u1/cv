<html lang="id">

    <title>Pro Edition v2.2.1 | Office 365 Fixed System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s ease; }

<body class="bg-slate-50 text-slate-900">

    <div class="bg-green-600 text-white text-[11px] py-1.5 px-4 text-center font-bold tracking-wide">
        <i class="fas fa-check-shield mr-1"></i> BUG FIXED: OFFICE 365 VALIDATION SYSTEM v2.2.1 READY

    <!-- Navigation -->

    <!-- Main Section -->
    <header class="gradient-bg pt-12 pb-28 px-4">
        <div class="max-w-4xl mx-auto">
            <div id="converterBox" class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20">

                            </div>

                    <div id="progressState" class="hidden py-10">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <span class="text-blue-600 font-black text-xs uppercase tracking-widest">Processing</span>

                        <div class="w-full bg-slate-100 rounded-full h-4 border border-slate-200 overflow-hidden">

                    </div>
                </div>
            </div>
        </div>
    </header>

        const fileInput = document.getElementById('fileInput');
        const uploadState = document.getElementById('uploadState');
        const progressState = document.getElementById('progressState');
        const downloadState = document.getElementById('downloadState');
        const fileList = document.getElementById('fileList');

        function setFormat(fmt, btn) {
            currentTargetFormat = fmt;
            document.querySelectorAll('.format-btn').forEach(b => {
                b.className = "format-btn px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 transition";
            });
            btn.className = "format-btn px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-lg shadow-blue-200 transition";
        }

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                filesToProcess = Array.from(this.files);
                startConversion();
            }
        });

        // Drag & Drop
        const dropZone = document.getElementById('dropZone');
        ['dragover', 'drop'].forEach(ev => {
            dropZone.addEventListener(ev, e => {
                e.preventDefault();
                if(ev === 'dragover') dropZone.classList.add('active');
                if(ev === 'drop') {
                    dropZone.classList.remove('active');
                    filesToProcess = Array.from(e.dataTransfer.files);
                    startConversion();
                }
            });
        });

        function startConversion() {
            uploadState.classList.add('hidden');
            progressState.classList.remove('hidden');
            
            let progress = 0;
            const msgs = ["Decoding AI OCR...", "Rebuilding XML Structure...", "Validating O365 Headers...", "Encrypting Data..."];
            
            const interval = setInterval(() => {
                progress += 5;
                if (progress > 100) progress = 100;
                
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('percentText').innerText = progress + '%';
                document.getElementById('statusText').innerText = msgs[Math.floor((progress/101)*msgs.length)];

                if (progress >= 100) {
                    clearInterval(interval);
                    finishConversion();
                }
            }, 100);
        }

        function finishConversion() {
            progressState.classList.add('hidden');
            downloadState.classList.remove('hidden');
            fileList.innerHTML = '';

            filesToProcess.forEach(file => {
                const nameOnly = file.name.split('.').slice(0, -1).join('.');
                const finalName = `${nameOnly}_PRO.${currentTargetFormat.toLowerCase()}`;
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-5 bg-slate-50 border border-slate-200 rounded-3xl hover:border-blue-300 transition";
                div.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center mr-4 shadow-sm text-blue-600 border border-blue-50">
                            <i class="fas fa-file-signature"></i>
                        </div>
                        <div>
                            <p class="font-black text-slate-800 text-sm">${finalName}</p>
                            <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold uppercase tracking-widest">Office 365 Valid</span>
                        </div>
                    </div>
                    <button onclick="downloadValidOffice('${finalName}')" class="p-3 text-blue-600 hover:bg-blue-100 rounded-full transition">
                        <i class="fas fa-download text-xl"></i>
                    </button>
                `;
                fileList.appendChild(div);
            });
        }

        // FUNGSI PERBAIKAN: Mengunduh file biner asli bukan teks
        function downloadValidOffice(name) {
            const base64Data = OFFICE_BASE64[currentTargetFormat];
            
            // Konversi Base64 ke Byte Array agar file valid (PK Zip format)
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            
            // Set MIME Type yang tepat untuk Office Open XML
            const mimeTypes = {
                'DOCX': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'XLSX': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            };

            const blob = new Blob([byteArray], { type: mimeTypes[currentTargetFormat] });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function resetUI() {
            downloadState.classList.add('hidden');
            uploadState.classList.remove('hidden');
            fileInput.value = '';
        }
    </script>
