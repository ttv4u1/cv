<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Vision Ultra | System, Network & AI Doc Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-cyan: #00f2ff;
            --accent-gold: #ffcc00;
        }

        body {
            background: radial-gradient(circle at center, #0f172a, #020617);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 3D Upload Zone */
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
        }

        .upload-zone:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 255, 0.05);
            transform: translateY(-5px);
        }

        .handwriting {
            font-family: 'Dancing Script', cursive;
            background: linear-gradient(to right, #00f2ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Nav Buttons */
        .nav-btn {
            padding: 12px 24px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .nav-btn.active {
            background: var(--accent-cyan);
            color: black;
            font-weight: 600;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Progress Bar Pixar Style */
        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2ff, #bc13fe);
            box-shadow: 0 0 15px var(--accent-cyan);
            transition: width 0.4s;
        }

        .doc-icon {
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--accent-cyan); }
            50% { box-shadow: 0 0 20px var(--accent-cyan); }
            100% { box-shadow: 0 0 5px var(--accent-cyan); }
        }
        .active-process { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="main-interface">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="handwriting text-5xl md:text-6xl mb-2">Pro-Vision Hub</h1>
                <p class="text-xs tracking-[0.3em] text-cyan-400 font-light">INTELLIGENT SYSTEM & DOCUMENT SUITE</p>
            </div>
            <div class="flex gap-3">
                <div class="glass-panel px-4 py-2 text-xs flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                    AI ENGINE: v4.2 PRO
                </div>
                <button onclick="exportToPDF()" class="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-xl border border-white/20 text-sm transition-all">
                    Export Report
                </button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="flex gap-3 mb-10 overflow-x-auto no-scrollbar pb-2">
            <button onclick="switchTab('converter')" class="nav-btn active" id="btn-converter">📄 Smart Converter</button>
            <button onclick="switchTab('system')" class="nav-btn" id="btn-system">💻 System Health</button>
            <button onclick="switchTab('network')" class="nav-btn" id="btn-network">🌐 Network Pro</button>
        </nav>

        <!-- Section 1: AI DOCUMENT CONVERTER -->
        <div id="tab-converter" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Upload Area -->
                <div class="glass-panel p-8 col-span-1 md:col-span-2 flex flex-col items-center justify-center upload-zone" id="dropZone">
                    <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
                    <div class="mb-6 text-6xl doc-icon">📂</div>
                    <h3 class="text-xl font-semibold mb-2">Drop documents here</h3>
                    <p class="text-gray-400 text-sm mb-6 text-center">Support PDF, DOCX, JPG, PNG, TXT (Max 50MB)</p>
                    <button onclick="document.getElementById('fileInput').click()" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 px-8 rounded-2xl transition-all transform active:scale-95">
                        Select Files
                    </button>
                </div>

                <!-- Conversion Settings -->
                <div class="glass-panel p-6">
                    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <span class="text-cyan-400">⚙️</span> Output Settings
                    </h3>
                    <div class="space-y-4">
                        <label class="block">
                            <span class="text-xs text-gray-400">Convert To:</span>
                            <select id="targetFormat" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-2 outline-none focus:border-cyan-500">
                                <option value="docx">Microsoft Word (.docx)</option>
                                <option value="xlsx">Microsoft Excel (.xlsx)</option>
                                <option value="pptx">PowerPoint (.pptx)</option>
                                <option value="pdf">Portable Document (.pdf)</option>
                            </select>
                        </label>
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5">
                            <input type="checkbox" checked class="accent-cyan-500">
                            <span class="text-xs">AI OCR Recognition</span>
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5">
                            <input type="checkbox" checked class="accent-cyan-500">
                            <span class="text-xs">Preserve Formatting</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Processing Queue -->
            <div class="glass-panel p-6 hidden" id="processingCard">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-4">Active Processing</h3>
                <div id="fileList" class="space-y-4">
                    <!-- Dynamic File Items -->
                </div>
            </div>
        </div>

        <!-- Section 2: System Health (Previously built) -->
        <div id="tab-system" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-panel p-6 col-span-1 md:col-span-2">
                <canvas id="sysChart" height="200"></canvas>
            </div>
            <div class="glass-panel p-6 flex flex-col items-center justify-center">
                <div class="text-4xl mb-2">🔋</div>
                <div class="text-2xl font-bold">88%</div>
                <p class="text-xs text-gray-400">Stable Power</p>
            </div>
        </div>

        <!-- Section 3: Network (Previously built) -->
        <div id="tab-network" class="hidden glass-panel p-10 text-center">
            <h2 class="text-2xl mb-4">Network Diagnostics</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="p-4 bg-white/5 rounded-2xl">
                    <p class="text-xs text-gray-400">Ping</p>
                    <p class="text-xl font-bold text-cyan-400">12ms</p>
                </div>
                <!-- ... other network stats ... -->
            </div>
        </div>
    </div>

    <script>
        // --- Navigation Logic ---
        function switchTab(tab) {
            ['converter', 'system', 'network'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('active');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
        }

        // --- Document Converter Logic ---
        const dropZone = document.getElementById('dropZone');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropZone.addEventListener('drop', e => {
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            if(files.length === 0) return;
            document.getElementById('processingCard').classList.remove('hidden');
            const fileList = document.getElementById('fileList');
            
            Array.from(files).forEach(file => {
                const fileId = 'file-' + Math.random().toString(36).substr(2, 9);
                const targetFormat = document.getElementById('targetFormat').value;
                
                const html = `
                    <div id="${fileId}" class="flex flex-col p-4 bg-white/5 rounded-2xl border border-white/10 active-process">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">📄</span>
                                <div>
                                    <p class="text-sm font-semibold">${file.name}</p>
                                    <p class="text-[10px] text-gray-500">${(file.size/1024).toFixed(1)} KB • Preparing...</p>
                                </div>
                            </div>
                            <div id="status-${fileId}" class="text-xs font-bold text-cyan-400">0%</div>
                        </div>
                        <div class="progress-container">
                            <div id="bar-${fileId}" class="progress-bar"></div>
                        </div>
                        <div id="download-${fileId}" class="hidden mt-3 flex justify-end">
                            <button onclick="downloadSimulatedFile('${file.name}', '${targetFormat}')" class="text-[10px] bg-green-500/20 text-green-400 border border-green-500/50 px-3 py-1 rounded-lg hover:bg-green-500 hover:text-black transition-all">
                                ⬇️ Download Converted .${targetFormat}
                            </button>
                        </div>
                    </div>
                `;
                fileList.innerHTML = html + fileList.innerHTML;
                simulateConversion(fileId);
            });
        }

        function simulateConversion(id) {
            let progress = 0;
            const bar = document.getElementById(`bar-${id}`);
            const status = document.getElementById(`status-${id}`);
            const card = document.getElementById(id);
            
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    finalizeConversion(id);
                }
                bar.style.width = progress + '%';
                status.innerText = Math.floor(progress) + '%';
            }, 400);
        }

        function finalizeConversion(id) {
            document.getElementById(`status-${id}`).innerText = "COMPLETED";
            document.getElementById(`status-${id}`).classList.replace('text-cyan-400', 'text-green-400');
            document.getElementById(`download-${id}`).classList.remove('hidden');
            document.getElementById(id).classList.remove('active-process');
        }

        function downloadSimulatedFile(originalName, format) {
            const baseName = originalName.split('.').slice(0, -1).join('.');
            const newName = `${baseName}_converted.${format}`;
            
            // Create dummy blob
            const blob = new Blob(["Simulated converted content for " + originalName], { type: "text/plain" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = newName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // --- System Chart (Basic) ---
        const ctx = document.getElementById('sysChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1', '2', '3', '4', '5'],
                datasets: [{
                    label: 'System Load',
                    data: [12, 19, 3, 5, 2],
                    borderColor: '#00f2ff',
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
